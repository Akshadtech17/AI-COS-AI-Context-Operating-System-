# AI-COS — single-node development compose
# For production, use docker-compose.prod.yml

services:
  aicos:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - aicos-data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  aicos-data:
