# AI-COS — production compose (v0.5.0)
#
# Features:
#   - nginx TLS termination (update nginx/nginx.conf with your domain + certs)
#   - PgBouncer connection pooler (transaction mode) — prevents connection exhaustion
#   - PostgreSQL 16 + pgvector (native vector similarity search)
#   - Redis for distributed rate limiting
#   - 4 AI-COS workers with readiness probes
#   - Prometheus + Grafana observability stack
#
# Quick start:
#   1. cp .env.example .env  and fill in your API keys
#   2. Set POSTGRES_PASSWORD in .env (default: change-me — DO CHANGE THIS)
#   3. Place TLS certs or update nginx.conf for Let's Encrypt
#   4. docker compose -f docker-compose.prod.yml up -d
#   5. Grafana: http://localhost:3000  (admin / change-me)
#   6. Prometheus: http://localhost:9090

x-aicos-common: &aicos-common
  build: .
  env_file:
    - .env
  environment:
    - DATABASE_URL=postgresql+asyncpg://aicos:${POSTGRES_PASSWORD:-change-me}@pgbouncer:5432/aicos
    - AICOS_REDIS_URL=redis://redis:6379/0
    - AICOS_LOG_JSON=true
    # PgBouncer in transaction mode — keep pools small per worker
    - AICOS_DB_POOL_SIZE=2
    - AICOS_DB_MAX_OVERFLOW=3
  depends_on:
    pgbouncer:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount your TLS certs here:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - aicos
    restart: unless-stopped

  # ── AI-COS gateway workers ─────────────────────────────────────────────────
  aicos:
    <<: *aicos-common
    command: uvicorn aicos.api.app:app --host 0.0.0.0 --port 4000 --workers 4
    expose:
      - "4000"
    healthcheck:
      # /ready is sub-millisecond — safe for container health without timeout issues
      test: ["CMD", "curl", "-sf", "http://localhost:4000/ready"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 3

  # ── PgBouncer connection pooler ────────────────────────────────────────────
  # Transaction-pooling mode: 4 workers × 4 stores × pool_size=2 = 32 app
  # connections → PgBouncer maps to 20 real PostgreSQL connections.
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    environment:
      DB_USER: aicos
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: aicos
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      SERVER_RESET_QUERY: DISCARD ALL
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U aicos || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL 16 + pgvector ───────────────────────────────────────────────
  # ankane/pgvector includes the pgvector extension pre-installed.
  # Migration 002 runs CREATE EXTENSION IF NOT EXISTS vector on startup.
  postgres:
    image: ankane/pgvector:v0.7.4
    environment:
      POSTGRES_USER: aicos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: aicos
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicos"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
        -c max_connections=100
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
