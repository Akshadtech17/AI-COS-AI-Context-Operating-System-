# AI-COS nginx reverse proxy — TLS termination + HTTP→HTTPS redirect
#
# Setup:
#   1. Obtain TLS certs (Let's Encrypt):
#      certbot certonly --standalone -d your-domain.com
#   2. Place at /etc/letsencrypt/live/your-domain.com/{fullchain,privkey}.pem
#   3. Replace "your-domain.com" below with your actual domain.
#   4. For self-signed dev certs:
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout /etc/ssl/private/aicos.key \
#        -out /etc/ssl/certs/aicos.crt \
#        -subj "/CN=localhost"

events {
    worker_connections 1024;
}

http {
    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header X-XSS-Protection          "1; mode=block";
    add_header Referrer-Policy           "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # ── Timeouts ──────────────────────────────────────────────────────────
    proxy_connect_timeout       10s;
    proxy_send_timeout          120s;
    proxy_read_timeout          120s;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"referrer":"$http_referer",'
            '"ua":"$http_user_agent",'
            '"req_id":"$http_x_request_id",'
            '"latency_ms":$request_time'
        '}';
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream aicos_backend {
        server aicos:4000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name your-domain.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name your-domain.com;

        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Proxy settings ────────────────────────────────────────────────
        location / {
            proxy_pass         http://aicos_backend;
            proxy_http_version 1.1;

            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Echo request ID back so clients can correlate logs
            proxy_set_header   X-Request-ID      $request_id;

            # SSE streaming support
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;
        }

        # ── Health check endpoint (no auth, no TLS warning) ──────────────
        location = /health {
            proxy_pass http://aicos_backend/health;
            proxy_set_header Host $host;
        }
    }
}
